<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrati | Borghi Storici d'Italia</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-container">
            <h1>REGISTRATI</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="borghi-storici.html">Storici</a></li>
                    <li><a href="borghi-mare.html">Mare</a></li>
                    <li><a href="borghi-fantasma.html">Fantasma</a></li>
                    <li><a href="video-borghi.html">Video</a></li>
                    <li><a href="alloggi.html">Alloggi</a></li>
                    <li><a href="registrazione.html">Registrati</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="form-wrapper" class="form-container">
            <h2>Registrati al portale</h2>
            <form id="registrazioneForm">
                <div class="form-group">
                    <label for="email">Inserisci la tua email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Inserisci la password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="telefono">Inserisci il numero di telefono:</label>
                    <input type="tel" id="telefono" name="telefono">
                </div>
                <button type="submit" class="btn">Invia Dati</button>
            </form>
        </section>

        <div id="messaggioSuccesso" class="form-container" style="display:none; text-align:center;">
            <h2 style="color: #8a9a5b;">Registrazione completata!</h2>
            <p>Grazie per esserti registrato al nostro portale dei Borghi.</p>
            <br>
            <a href="index.html" class="btn">Torna alla Home</a>
        </div>
    </main>

    <footer>
    </footer>

    <script>
        document.getElementById('registrazioneForm').addEventListener('submit', function(event) {
            // Impedisce al form di inviare dati al server (evita l'errore 405)
            event.preventDefault();
            
            // Nasconde il modulo
            document.getElementById('form-wrapper').style.display = 'none';
            // Mostra il messaggio di successo
            document.getElementById('messaggioSuccesso').style.display = 'block';
        });
    </script>

</body>
</html>
